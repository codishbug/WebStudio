<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — WebRyx</title>

<style>
:root{
--primary:#116466;
--secondary:#4ec9cb;
--dark:#2C3531;
--light:#e9f5f4;
}

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(-45deg,#116466,#4ec9cb,#2C3531,#4ec9cb);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.login-card{
width:400px;
padding:40px;
background:rgba(255,255,255,0.96);
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
animation:fadeIn 0.7s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;}
}

.title{
text-align:center;
font-size:26px;
font-weight:600;
margin-bottom:22px;
color:var(--dark);
}

.input-box{ margin-bottom:16px; }

.input-box input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
background:var(--light);
outline:none;
font-size:14px;
transition:border-color 0.2s;
}

.input-box input:focus{ border-color:var(--primary); }

.login-btn{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:var(--primary);
color:white;
font-size:15px;
cursor:pointer;
transition:background 0.3s;
}

.login-btn:hover{ background:var(--dark); }
.login-btn:disabled{ opacity:0.7; cursor:not-allowed; }

.divider{
display:flex;
align-items:center;
gap:10px;
margin:20px 0;
color:#aaa;
font-size:13px;
}
.divider::before,
.divider::after{
content:"";
flex:1;
height:1px;
background:#e0e0e0;
}

.google-btn{
width:100%;
padding:11px;
border:1.5px solid #ddd;
border-radius:8px;
background:white;
color:#333;
font-size:14px;
font-weight:500;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
transition:background 0.2s, box-shadow 0.2s;
text-decoration:none;
}

.google-btn:hover{
background:#f5f5f5;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
color:#333;
}

.google-btn svg{
width:20px;
height:20px;
flex-shrink:0;
}

.alert{
padding:10px 14px;
border-radius:8px;
margin-bottom:14px;
font-size:14px;
text-align:center;
}
.alert.error,.alert.danger{
background:#fde8e8;
color:#9b1c1c;
border:1px solid #f8b4b4;
}
.alert.success{
background:#def7ec;
color:#03543f;
border:1px solid #84e1bc;
}
.alert.warning{
background:#fdf6b2;
color:#723b13;
border:1px solid #faca15;
}

#inline-error{
display:none;
padding:10px 14px;
border-radius:8px;
margin-bottom:14px;
font-size:14px;
text-align:center;
background:#fde8e8;
color:#9b1c1c;
border:1px solid #f8b4b4;
transition:opacity 0.4s;
}

.bottom{
text-align:center;
margin-top:18px;
font-size:14px;
}
.bottom a{ color:var(--primary); text-decoration:none; }
</style>

</head>
<body>

<div class="login-card">

  <div class="title">Login</div>

  <!-- Flask flash messages (registration success, logout notice, etc.) -->
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endif %}
  {% endwith %}

  <!-- Inline JS error (no page refresh) -->
  <div id="inline-error"></div>

  <form id="login-form">

    <!-- Carries ?next= URL through the fetch body -->
    <input type="hidden" id="next-url" value="{{ next_url | default('') }}">

    <div class="input-box">
      <input type="text" id="username" placeholder="Username" required>
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Password" required>
    </div>

    <div style="text-align:right; margin-bottom:14px;">
      <a href="/forgot-password" style="font-size:13px; color:var(--primary);">
        Forgot Password?
      </a>
    </div>

    <button type="submit" class="login-btn" id="login-btn">Login</button>

  </form>

  <!-- OR divider -->
  <div class="divider">or</div>

  <!--
    Google Login Button.
    Passes ?next= so after OAuth the user lands on the right page.
  -->
  <a href="/login/google{% if next_url %}?next={{ next_url | urlencode }}{% endif %}"
     class="google-btn">

    <!-- Official Google "G" logo -->
    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path fill="#EA4335"
        d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85l6.1-6.1C34.46 3.09
           29.53 1 24 1 14.82 1 7.07 6.48 3.64 14.18l7.12 5.53
           C12.4 13.47 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4"
        d="M46.52 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.7
           c-.55 2.98-2.22 5.5-4.72 7.2l7.3 5.67
           C43.46 37.1 46.52 31.27 46.52 24.5z"/>
      <path fill="#FBBC05"
        d="M10.76 28.29A14.6 14.6 0 0 1 9.5 24c0-1.49.26-2.93.72-4.29
           L3.1 14.18A23.93 23.93 0 0 0 0 24c0 3.87.93 7.52 2.56 10.74
           l8.2-6.45z"/>
      <path fill="#34A853"
        d="M24 47c5.53 0 10.17-1.83 13.56-4.97l-7.3-5.67
           C28.46 37.7 26.34 38.5 24 38.5
           c-6.26 0-11.6-3.97-13.24-9.71l-8.2 6.45
           C6.06 41.5 14.36 47 24 47z"/>
      <path fill="none" d="M0 0h48v48H0z"/>
    </svg>

    Continue with Google
  </a>

  <div class="bottom">
    Don't have an account? <a href="/register">Register</a>
  </div>

</div>


<script>
(function () {

  const form     = document.getElementById('login-form');
  const btn      = document.getElementById('login-btn');
  const errorBox = document.getElementById('inline-error');
  const nextUrl  = document.getElementById('next-url').value;

  function showError(msg) {
    errorBox.style.opacity = '1';
    errorBox.textContent   = msg;
    errorBox.style.display = 'block';
    setTimeout(function () {
      errorBox.style.opacity = '0';
      setTimeout(function () {
        errorBox.style.display = 'none';
        errorBox.style.opacity = '1';
      }, 400);
    }, 3500);
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.textContent = 'Logging in…';
    btn.disabled    = true;
    errorBox.style.display = 'none';

    try {
      const res  = await fetch('/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password, next: nextUrl })
      });
      const data = await res.json();

      if (res.ok && data.redirect) {
        window.location.href = data.redirect;
      } else {
        showError(data.message || 'Invalid username or password.');
      }
    } catch (err) {
      showError('Something went wrong. Please try again.');
    }

    btn.textContent = 'Login';
    btn.disabled    = false;
  });

})();
</script>

</body>
</html>
