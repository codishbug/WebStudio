{% extends "base.html" %}

{% block content %}

        <!-- Contact Start -->
        <div class="container-fluid py-5 mb-5">
            <div class="container">
                <div class="text-center mx-auto pb-5 wow fadeIn" data-wow-delay=".3s" style="max-width: 600px;">
                    <h5 class="text-secondary">Get In Touch</h5>
                    <h1 class="mb-3">Contact for any query</h1>
                </div>
                <div class="contact-detail position-relative p-5">
                    <div class="row g-4 mb-5 justify-content-center align-items-stretch">
                        <div class="col-xl-4 col-lg-6 wow fadeIn" data-wow-delay=".3s">
                            <div class="d-flex bg-light p-3 rounded h-100 align-items-center">
                                <div class="flex-shrink-0 btn-square bg-secondary rounded-circle" style="width: 64px; height: 64px;">
                                    <i class="fas fa-map-marker-alt text-white"></i>
                                </div>
                                <div class="ms-3 w-100">
                                    <h4 class="text-secondary">Address</h4>
                                    <a href="https://maps.google.com/?q=Pimpri+Chinchwad+College+of+Engineering+Nigdi" target="_blank" class="h5">Pune, Maharashtra, India</a>
</a>
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-4 col-lg-6 wow fadeIn" data-wow-delay=".5s">
                            <div class="d-flex bg-light p-3 rounded h-100 align-items-center">
                                <div class="flex-shrink-0 btn-square bg-secondary rounded-circle" style="width: 64px; height: 64px;">
                                    <i class="fa fa-phone text-white"></i>
                                </div>
                                <div class="ms-3 w-100">
                                    <h4 class="text-secondary">Call Us</h4>
                                    <a class="h5" href="tel:+0123456789" target="_blank">+91 7040974090</a>
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-4 col-lg-6 wow fadeIn" data-wow-delay=".7s">
                            <div class="d-flex bg-light p-3 rounded h-100 align-items-center">
                                <div class="flex-shrink-0 btn-square bg-secondary rounded-circle" style="width: 64px; height: 64px;">
                                    <i class="fa fa-envelope text-white"></i>
                                </div>
                                <div class="ms-3 w-100">
                                    <h4 class="text-secondary">Email Us</h4>
                                    <a class="h5" href="mailto:info@example.com" target="_blank">
                                        thewebstudio.io@gmail.com
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row g-5">
                        <div class="col-lg-6 wow fadeIn" data-wow-delay=".3s">
                            <div class="p-5 h-100 rounded contact-map">
                                <iframe 
                                class="rounded w-100 h-100"
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3780.273282914895!2d73.75906487519485!3d18.6517287824674!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2b9e76c8fa205%3A0x1b210131915734fd!2sPCCOE%20-%20Pimpri%20Chinchwad%20College%20Of%20Engineering!5e0!3m2!1sen!2sin!4v1771258064489!5m2!1sen!2sin"
                                style="border:0;"
                                allowfullscreen=""
                                loading="lazy"
                                referrerpolicy="no-referrer-when-downgrade">
                                </iframe>
                            </div>
                        </div>
                        <div class="col-lg-6 wow fadeIn" data-wow-delay=".5s">
                            <div class="p-5 rounded contact-form">
                                <div class="mb-4">
                                    <input id="name" type="text" class="form-control border-0 py-3" placeholder="Your Name">
                                </div>
                                <div class="mb-4">
                                    <input id="email" type="email" class="form-control border-0 py-3" placeholder="Your Email">
                                </div>
                                <div class="mb-4">
                                    <input id="subject" type="text" class="form-control border-0 py-3" placeholder="Subject">
                                </div>
                                <div class="mb-4">
                                    <textarea 
                                        id="message" 
                                        class="w-100 form-control border-0 py-3" 
                                        rows="6" 
                                        maxlength="1000"
                                        placeholder="Message"></textarea>

                                    <small class="text-white fw-semibold">
                                        Characters: <span id="charCount">0</span> / 1000
                                    </small>
                                </div>
                                <div class="text-start">
                                    <button type="button" onclick="sendMessage()" class="btn btn-secondary text-white py-3 px-5">
                                    Send Message</button>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div> 
        </div>
        <!-- Contact End -->



<script>
const messageInput = document.getElementById("message");
const charCount = document.getElementById("charCount");

messageInput.addEventListener("input", function () {
    charCount.textContent = messageInput.value.length;
});
</script>

 {% endblock %}
