<!DOCTYPE html>
<html lang="en">
<head>
<link href="{{ url_for('static', filename='admin/admin-theme.css') }}" rel="stylesheet">
<meta charset="utf-8">
<title>Edit Blogs – WebStudio Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="{{ url_for('static', filename='user/css/bootstrap.min.css') }}" rel="stylesheet">
<link href="{{ url_for('static', filename='user/css/style.css') }}" rel="stylesheet">
<link href="{{ url_for('static', filename='admin/admin.css') }}" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="p-4">

<div class="container">

<h2 class="text-primary mb-4">Edit Blogs</h2>

<!-- BLOG LIST VIEW -->
<div id="blogListView">
    <div class="card shadow">
        <div class="card-body">
            <h5 class="mb-3">All Blogs</h5>
            <table class="table table-hover">
                <thead class="bg-primary text-white">
                    <tr>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Category</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="blogsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- EDIT VIEW -->
<div id="editView" style="display:none;">
    <div class="card shadow">
        <div class="card-body">

            <button class="btn btn-secondary mb-3" onclick="backToList()">← Back</button>

            <input type="hidden" id="edit-id">

            <div class="mb-3">
                <label>Title</label>
                <input type="text" id="edit-title" class="form-control">
            </div>

            <div class="mb-3">
                <label>Excerpt</label>
                <textarea id="edit-excerpt" class="form-control" rows="2"></textarea>
            </div>

            <div class="mb-3">
                <label>Category</label>
                <input type="text" id="edit-category" class="form-control">
            </div>

            <div class="mb-3">
                <label>Read Time (minutes)</label>
                <input type="number" id="edit-read" class="form-control">
            </div>

            <div class="mb-3">
                <label>Status</label>
                <select id="edit-status" class="form-select">
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Content</label>
                <textarea id="edit-content" class="form-control" rows="6"></textarea>
            </div>

            <div class="mb-3">
                <label>Replace Image</label>
                <input type="file" id="edit-image" class="form-control">
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-success" onclick="updateBlog()">Save Changes</button>
                <button class="btn btn-danger" onclick="deleteBlog()">Delete</button>
            </div>

        </div>
    </div>
</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://yuuvbsctwcrzubblkjlq.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1dXZic2N0d2NyenViYmxramxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3ODIzNjYsImV4cCI6MjA4NjM1ODM2Nn0.2js6OF_T1oBECrSHJVgSF7_H5KYTpWqdQAGjgs5dVUs"
);

// LOAD BLOG LIST
async function loadBlogs() {

const { data: blogs, error } = await supabaseClient
.from("blogs")
.select("*")
.order("id", { ascending: false });

if (error) {
console.log(error);
return;
}

const table = document.getElementById("blogsTable");
table.innerHTML = "";

blogs.forEach(blog => {
table.innerHTML += `
<tr>
<td>${blog.title}</td>
<td>
<span class="badge bg-${blog.status === "published" ? "success" : "warning"}">
${blog.status}
</span>
</td>
<td>${blog.category}</td>
<td>
<button class="btn btn-sm btn-primary"
onclick='openEdit(${JSON.stringify(blog)})'>
Edit
</button>
</td>
</tr>
`;
});
}

// OPEN EDIT VIEW
function openEdit(blog) {

document.getElementById("blogListView").style.display = "none";
document.getElementById("editView").style.display = "block";

document.getElementById("edit-id").value = blog.id;
document.getElementById("edit-title").value = blog.title;
document.getElementById("edit-excerpt").value = blog.excerpt || "";
document.getElementById("edit-category").value = blog.category;
document.getElementById("edit-read").value = blog.read_time;
document.getElementById("edit-status").value = blog.status;
document.getElementById("edit-content").value = blog.content || "";
}

// BACK TO LIST
function backToList() {
document.getElementById("editView").style.display = "none";
document.getElementById("blogListView").style.display = "block";
loadBlogs();
}

// IMAGE UPLOAD
async function uploadImage(file) {
const fileName = Date.now() + "-" + file.name;

const { error } = await supabaseClient.storage
.from("blog-images")
.upload(fileName, file);

if (error) return null;

const { data } = supabaseClient.storage
.from("blog-images")
.getPublicUrl(fileName);

return data.publicUrl;
}

// UPDATE BLOG
async function updateBlog() {

const id = document.getElementById("edit-id").value;

let imageUrl = null;
const file = document.getElementById("edit-image").files[0];

if (file) {
imageUrl = await uploadImage(file);
}

const updateData = {
title: document.getElementById("edit-title").value,
excerpt: document.getElementById("edit-excerpt").value,
category: document.getElementById("edit-category").value,
read_time: parseInt(document.getElementById("edit-read").value),
status: document.getElementById("edit-status").value,
content: document.getElementById("edit-content").value
};

if (imageUrl) {
updateData.image_url = imageUrl;
}

const { error } = await supabaseClient
.from("blogs")
.update(updateData)
.eq("id", id);

if (!error) {
alert("Updated successfully");
backToList();
} else {
alert(error.message);
}
}

// DELETE BLOG
async function deleteBlog() {

const id = document.getElementById("edit-id").value;

if (!confirm("Delete this blog permanently?")) return;

const { error } = await supabaseClient
.from("blogs")
.delete()
.eq("id", id);

if (!error) {
alert("Deleted successfully");
backToList();
} else {
alert(error.message);
}
}

loadBlogs();

</script>

<script>
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
    } else {
        document.documentElement.setAttribute("data-theme", "light");
    }
</script>

</body>
</html>
