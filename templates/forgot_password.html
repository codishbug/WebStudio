<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — WebRyx</title>

<style>

:root{
--bs-primary:#116466;
--bs-secondary:#4ec9cb;
--bs-dark:#2C3531;
--bs-light:#e9f5f4;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(-45deg,#116466,#4ec9cb,#2C3531,#4ec9cb);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:380px;
padding:40px;
background:rgba(255,255,255,0.95);
border-radius:14px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
animation:fadeIn 0.7s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;}
}

.title{
text-align:center;
font-size:24px;
font-weight:600;
margin-bottom:8px;
color:var(--bs-dark);
}

.subtitle{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:25px;
}

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
background:var(--bs-light);
outline:none;
font-size:14px;
}

.input-box input:focus{
border-color:var(--bs-primary);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:var(--bs-primary);
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:var(--bs-dark);
}

button:disabled{
opacity:0.7;
cursor:not-allowed;
}

.bottom{
text-align:center;
margin-top:18px;
font-size:14px;
}

.bottom a{
color:var(--bs-primary);
text-decoration:none;
font-weight:500;
}

/* Flash messages */
.alert{
padding:10px 14px;
border-radius:8px;
margin-bottom:15px;
font-size:14px;
text-align:center;
}

.alert.error, .alert.danger{
background:#fde8e8;
color:#9b1c1c;
border:1px solid #f8b4b4;
}

.alert.success{
background:#def7ec;
color:#03543f;
border:1px solid #84e1bc;
}

.alert.warning{
background:#fdf6b2;
color:#723b13;
border:1px solid #faca15;
}

</style>

</head>

<body>

<div class="card">

  <div class="title">Forgot Password?</div>
  <p class="subtitle">Enter your registered email and we'll send you a reset link.</p>

  <!-- Flask flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endif %}
  {% endwith %}

  <form action="/forgot-password" method="POST" id="fp-form">

    <div class="input-box">
      <input type="email" name="email" placeholder="Enter your email" required>
    </div>

    <button type="submit" id="fp-btn">Send Reset Link</button>

  </form>

  <div class="bottom">
    Remembered it? <a href="/login">Back to Login</a>
  </div>

</div>

<script>
/* Disable button after submit to prevent double-clicks */
document.getElementById('fp-form').addEventListener('submit', function () {
  const btn = document.getElementById('fp-btn');
  btn.textContent = 'Sending…';
  btn.disabled = true;
});
</script>

</body>
</html>
